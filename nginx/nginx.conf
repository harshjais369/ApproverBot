limit_req_zone $binary_remote_addr zone=verify_api:10m rate=5r/m;
# ── HTTP: serve ACME challenge, redirect all else to HTTPS ─────────────────
server {
    listen 80;
    server_name crocodile.games;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name crocodile.games;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/crocodile.games/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crocodile.games/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options     "nosniff"                                       always;
    add_header Referrer-Policy            "no-referrer"                                    always;
    add_header Content-Security-Policy    "default-src 'self'; frame-ancestors 'self' https://web.telegram.org https://*.telegram.org; script-src 'self' 'unsafe-inline' https://telegram.org; style-src 'unsafe-inline' 'self'; connect-src 'self'; img-src 'self' data:; font-src 'self';" always;

    # Rate-limit zone: 5 verification attempts per minute per IP

    # Serve home page
    location = / {
        proxy_pass              http://bot:5000/;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $remote_addr;
        proxy_read_timeout 30s;
    }

    # Serve T&C pages
    location ~ ^/(terms|tnc|rules)$ {
        proxy_pass              http://bot:5000$request_uri;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $remote_addr;
        proxy_read_timeout 30s;
    }

    # Serve the verification page
    location = /verify {
        proxy_pass              http://bot:5000/verify;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $remote_addr;   # single trusted IP, no spoofing
        proxy_read_timeout 30s;
    }

    # Accept fingerprint POST — rate-limited
    location = /api/verify {
        limit_req zone=verify_api burst=3 nodelay;
        proxy_pass              http://bot:5000/api/verify;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $remote_addr;
        proxy_read_timeout 30s;
        client_max_body_size 64k;
    }
}
