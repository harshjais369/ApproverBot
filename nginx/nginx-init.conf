# Temporary HTTP-only config used once to obtain the initial SSL certificate.
# replace nginx.conf with the contents of nginx.conf after certs are obtained.
server {
    listen 80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
