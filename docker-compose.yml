services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Override these three regardless of what is in .env
      DB_PATH: /app/data/approverbot.db
      WEB_HOST: 0.0.0.0
      WEB_PORT: 5000
    volumes:
      - db_data:/app/data
    expose:
      - "5000"        # Visible only to other containers — NOT the host
    networks:
      - internal
    depends_on: []

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    networks:
      - internal
    depends_on:
      - bot

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Automatically renews certificates every 12 hours
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --quiet --webroot -w /var/www/certbot;
        sleep 12h & wait $${!};
      done"

volumes:
  db_data:
  certbot_www:
  certbot_conf:

networks:
  internal:
    driver: bridge
